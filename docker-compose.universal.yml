version: '3.8'

x-common-env: &common-env
  TZ: Asia/Shanghai

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  mysql:
    image: mysql:8.0
    container_name: stock_mysql
    restart: unless-stopped
    environment:
      <<: *common-env
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stock_pool}
      MYSQL_USER: ${MYSQL_USER:-stock_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stock_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --innodb_buffer_pool_size=256M
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - stock_network

  redis:
    image: redis:7-alpine
    container_name: stock_redis
    restart: unless-stopped
    environment:
      <<: *common-env
    command: 
      - redis-server
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - stock_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: aistock-backend:latest
    container_name: stock_backend
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-stock_user}:${MYSQL_PASSWORD:-stock_password}@mysql:3306/${MYSQL_DATABASE:-stock_pool}
      DATABASE_URL_SYNC: mysql+pymysql://${MYSQL_USER:-stock_user}:${MYSQL_PASSWORD:-stock_password}@mysql:3306/${MYSQL_DATABASE:-stock_pool}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production-min-32-chars-long}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    volumes:
      - ./backend:/app:cached
      - ./data:/app/data
      - backend_cache:/root/.cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      timeout: 5s
      retries: 5
    networks:
      - stock_network

  frontend:
    image: nginx:alpine
    container_name: stock_frontend
    restart: unless-stopped
    environment:
      <<: *common-env
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
    networks:
      - stock_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_cache:
    driver: local

networks:
  stock_network:
    driver: bridge
